# Tether Coturn Configuration
# TURN/STUN server for WebRTC voice and video relaying.
#
# SECURITY: denied-peer-ip rules prevent TURN relay abuse by blocking
# all private/reserved IP ranges. Without these rules, an attacker could
# use the TURN server to probe or attack internal services.

# ---------------------------------------------------------------------------
# RFC 1918 private ranges — block all internal network relay
# ---------------------------------------------------------------------------
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# ---------------------------------------------------------------------------
# Loopback
# ---------------------------------------------------------------------------
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1

# ---------------------------------------------------------------------------
# Link-local (APIPA)
# ---------------------------------------------------------------------------
denied-peer-ip=169.254.0.0-169.254.255.255

# ---------------------------------------------------------------------------
# Authentication — ephemeral HMAC credentials (time-limited)
# COTURN_SECRET must match the COTURN_SECRET env var read by the app server.
# The app server generates short-lived credentials using this shared secret.
# ---------------------------------------------------------------------------
use-auth-secret
static-auth-secret=${COTURN_SECRET}
realm=${COTURN_REALM}

# ---------------------------------------------------------------------------
# Security hardening
# ---------------------------------------------------------------------------
fingerprint
no-multicast-peers
no-cli

# ---------------------------------------------------------------------------
# Relay port range
# Small range for development. For production, expand to 49152-65535 or use
# network_mode: host on Linux for full UDP performance.
# ---------------------------------------------------------------------------
min-port=49152
max-port=49200

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log-file=stdout
verbose

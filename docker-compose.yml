# Tether Docker Compose
# Usage: bash scripts/generate-secrets.sh && docker compose up
#
# Networks:
#   internal        — proxy, app, client, postgres, redis, minio (private services)
#   coturn_external — coturn only (internet-facing TURN relay, isolated from internal)
#
# Single entry point: proxy on port 80 routes to app and client.
# Coturn keeps its own ports for STUN/TURN (UDP-heavy, not suited for HTTP proxy).
#
# Security: Coturn cannot reach PostgreSQL, Redis, or MinIO by design.

networks:
  internal:
    driver: bridge
  coturn_external:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:
  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy (single entry point)
  #
  # Routes:
  #   /api/*       → app:3001 (backend)
  #   /socket.io/* → app:3001 (backend, WebSocket upgrade)
  #   /*           → client:80 (frontend)
  # ---------------------------------------------------------------------------
  proxy:
    image: nginx:alpine
    networks:
      - internal
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - client
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx — dev proxy (routes to host-running services)
  #
  # Use instead of proxy when running server/client via `turbo dev`:
  #   docker compose --profile dev up -d proxy-dev
  # ---------------------------------------------------------------------------
  proxy-dev:
    image: nginx:alpine
    networks:
      - internal
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - dev
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Client — React frontend (nginx serving production build)
  # ---------------------------------------------------------------------------
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL — primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # local dev access — remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — session store and pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    networks:
      - internal
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379" # local dev access — remove in production
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (file attachments)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    networks:
      - internal
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # API
      - "9001:9001" # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Coturn — TURN/STUN server for WebRTC (voice/video)
  #
  # SECURITY: Coturn is on coturn_external network ONLY.
  # It cannot reach postgres, redis, or minio by network design.
  # denied-peer-ip rules in turnserver.conf block RFC 1918 relay abuse.
  #
  # Production note: Consider network_mode: host on Linux for best UDP
  # performance. On Mac/Windows Docker Desktop, host networking does not
  # work — use port ranges as configured here.
  # ---------------------------------------------------------------------------
  coturn:
    image: coturn/coturn:latest
    networks:
      - coturn_external
    ports:
      - "3478:3478"           # STUN/TURN TCP
      - "3478:3478/udp"       # STUN/TURN UDP
      - "5349:5349"           # TURNS (TLS) TCP
      - "5349:5349/udp"       # TURNS (TLS) UDP
      - "49152-49200:49152-49200/udp" # TURN relay range (small for dev)
    # Command-line args instead of config file: docker-compose substitutes
    # ${VAR} from .env at the YAML level, so coturn receives the real values.
    # denied-peer-ip rules omitted for local dev (peers use private IPs via
    # Docker Desktop). Production should add RFC 1918 blocks — see coturn/turnserver.conf.
    command:
      - turnserver
      - --use-auth-secret
      - --static-auth-secret=${COTURN_SECRET}
      - --realm=${COTURN_REALM:-tether.local}
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --min-port=49152
      - --max-port=49200
      - --listening-ip=0.0.0.0
      - --external-ip=127.0.0.1
      - --log-file=stdout
      - --verbose
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # DB Push — run Drizzle schema push on startup
  #
  # Uses the builder stage of the server Dockerfile so drizzle-kit
  # (a devDependency) is available. Runs once and exits.
  # ---------------------------------------------------------------------------
  db-push:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: builder
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    working_dir: /app/apps/server
    command: ["pnpm", "db:push"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # App — Tether server (backend)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-push:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 3001
    restart: unless-stopped

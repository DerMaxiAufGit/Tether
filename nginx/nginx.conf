# Tether Reverse Proxy
# Routes all traffic through a single port:
#   /api/*       → app (backend)
#   /socket.io/* → app (backend, WebSocket upgrade)
#   /*           → client (frontend)

upstream backend {
    server app:3001;
}

upstream frontend {
    server client:80;
}

upstream minio_backend {
    server minio:9000;
}

server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------
    # API requests → backend
    # -------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------
    # Socket.IO → backend (HTTP + WebSocket)
    # -------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.IO long-poll and WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------------------------------------------------
    # MinIO storage proxy — presigned URL direct uploads/downloads
    # -------------------------------------------------------------------
    location /storage/ {
        proxy_pass http://minio_backend/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 26m;
        proxy_request_buffering off;
    }

    # -------------------------------------------------------------------
    # Everything else → frontend (nginx serving static files)
    # -------------------------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
